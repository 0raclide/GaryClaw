<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GaryClaw Evolution Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div style="display: flex; align-items: center; gap: 16px;">
      <span class="header-title">GARY<span class="claw">CLAW</span></span>
      <span id="connection-dot" class="connection-dot disconnected"></span>
    </div>
    <nav class="tabs">
      <button class="tab active" data-tab="live">Live</button>
      <button class="tab" data-tab="mutations">Mutations</button>
      <button class="tab" data-tab="growth">Growth</button>
      <button class="tab" data-tab="mind">Mind</button>
    </nav>
  </header>

  <!-- Error Banner -->
  <div id="error-banner" class="error-banner"></div>

  <!-- Main Content -->
  <main class="main">

    <!-- Live Feed -->
    <div id="view-live" class="view active">
      <div class="empty-state"><p>Loading...</p></div>
    </div>

    <!-- Mutation Timeline -->
    <div id="view-mutations" class="view">
      <div class="empty-state"><p>Loading...</p></div>
    </div>

    <!-- Growth Over Time -->
    <div id="view-growth" class="view">
      <div class="empty-state"><p>Loading...</p></div>
    </div>

    <!-- Oracle Mind -->
    <div id="view-mind" class="view">
      <div class="empty-state"><p>Loading...</p></div>
    </div>

  </main>

  <!-- Footer Status Bar -->
  <footer id="footer" class="footer">
    <span><span class="stat-value">--</span><span class="stat-label"> Health</span></span>
    <span><span class="stat-value">--</span><span class="stat-label"> Jobs today</span></span>
    <span><span class="stat-value">--</span><span class="stat-label"> Spent</span></span>
  </footer>

  <!-- Scripts (no build step) -->
  <script src="/assets/charts.js"></script>
  <script src="/assets/app.js"></script>

</body>
</html>
